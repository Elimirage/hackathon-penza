    <!-- Анимация падающих звёздочек -->
    <div id="stars-container"></div>
    <style>
        #stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ffb347;
            border-radius: 50%;
            box-shadow: 0 0 10px #ffb347, 0 0 20px #ffb347;
            opacity: 0.8;
            animation: fall linear infinite;
        }

            .star.purple {
                background: #9f4dbf;
                box-shadow: 0 0 10px #9f4dbf, 0 0 20px #9f4dbf;
            }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
            }
        }
    </style>

    <script>
        // Создание падающих звёздочек
        function createStars() {
            const container = document.getElementById('stars-container');
            const starCount = 100; // количество звёздочек

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';

                // Случайный цвет (фиолетовый или жёлтый)
                if (Math.random() > 0.5) {
                    star.classList.add('purple');
                }

                // Случайный размер (2-6px)
                const size = Math.random() * 4 + 2;
                star.style.width = size + 'px';
                star.style.height = size + 'px';

                // Случайная позиция слева
                star.style.left = Math.random() * 100 + '%';

                // Случайная задержка анимации
                star.style.animationDuration = Math.random() * 3 + 2 + 's'; // 2-5 секунд
                star.style.animationDelay = Math.random() * 5 + 's';

                container.appendChild(star);
            }
        }

        // Запускаем после загрузки страницы
        window.addEventListener('load', createStars);
    </script>

                { name: "ОПТИМА", direction: "PA", category: "python-advanced", members: ["Шахин Александр 🎯", "Поляков Дмитрий 🎯", "Камнев Егор", "Францев Александр 🎯", "Хохлова Елизавета"] },
                { name: "VIPit", direction: "PA", category: "python-advanced", members: ["Филенков Антон 🎯", "Терехин Ярослав 🎯", "Немушев Камиль 🎯", "Терешина Анастасия", "Крюкова Мария"] },
                { name: "Victorious", direction: "PA", category: "python-advanced", members: ["Григорькин Роман 🎯", "Балашов Всеволод 🎯", "Гулин Кирилл 🎯", "Трубицына Дарья 🎯", "Елисеева Елизавета 🎯"] },
                { name: "Павел Воля", direction: "PA", category: "python-advanced", members: ["Ратников Дмитрий 🎯", "Макарова Анна", "Кожевников Александр 🎯", "Елисеев Данила 🎯", "Прякина Екатерина 🎯"] },
                { name: "Знаний.нет", direction: "PA", category: "python-advanced", members: ["Кучерова Анна",  "Яшин Матвей", "Павлов Артем 🎯"] },
                { name: "Json.убийцы", direction: "PA", category: "python-advanced", members: ["Груздов Дмитрий 🎯", "Ежжижанский Иван", "Синицын Ярослав", "Прокофьев Егор 🎯"] },
                { name: "Дети индуса", direction: "PA", category: "python-advanced", members: ["Даянов Амир 🎯", "Устинов Артур 🎯", "Фролова Валерия 🎯", "Мамонова Кира 🎯"] },
                { name: "PyTeam Studio", direction: "PA", category: "python-advanced", members: ["Вохрамеев Ярослав 🎯", "Кузнецов Дмитрий 🎯", "Смельский Ростислав 🎯", "Юдин Егор 🎯", "Скрягина Алена 🎯"] }
            ];

            // Активная категория
            let activeCategory = 'scratch-start';

            // Фильтрация команд по категории
            function getFilteredTeams() {
                return teamsData.filter(t => t.category === activeCategory);
            }

            // Рендер
            function renderTeams() {
                const container = document.getElementById('teamsContainer');
                const filtered = getFilteredTeams();

                if (filtered.length === 0) {
                    container.innerHTML = '<div class="empty-message">✨ В этой категории пока нет команд</div>';
                    return;
                }

                let html = '';
                filtered.forEach(team => {
                    let membersHtml = '';
                    team.members.forEach(member => {
                        membersHtml += `
                        <li class="member-item">
                            <i class="fas fa-user"></i>
                            <span class="member-name">${member}</span>
                        </li>
                    `;
                    });

                    html += `
                    <div class="team-card">
                        <div class="team-header">
                            <span class="team-name">${team.name}</span>
                            <span class="team-direction">${team.direction}</span>
                        </div>
                        <ul class="members-list">
                            ${membersHtml}
                        </ul>
                        <div class="team-footer">
                            <span class="member-count"><i class="fas fa-users"></i> ${team.members.length} участников</span>
                        </div>
                    </div>
                `;
                });

                container.innerHTML = html;
            }

            // Переключение вкладок
            function initTabs() {
                const tabs = document.querySelectorAll('.tab-btn');
                tabs.forEach(tab => {
                    tab.addEventListener('click', () => {
                        tabs.forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        activeCategory = tab.dataset.category;
                        renderTeams();
                    });
                });
            }

            // Старт
            renderTeams();
            initTabs();
        })();
    </script>
</body>
